name: Daily data refresh & deploy

on:
  schedule:
    # 09:00 UTC daily — runs after the source table's morning refresh (~07:30 UTC)
    - cron: '0 9 * * *'
  workflow_dispatch: {} # allow manual runs from the Actions tab

permissions:
  contents: write # commit the refreshed baked-data.json + publish to gh-pages

concurrency:
  group: refresh-deploy
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Write service-account key from secret
        run: printf '%s' "$GCP_SA_KEY" > "$RUNNER_TEMP/gcp-sa-key.json"
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}

      - name: Refresh baked data from BigQuery
        run: npm run fetch-data
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/gcp-sa-key.json

      - name: Commit refreshed data (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- src/baked-data.json; then
            git add src/baked-data.json
            git commit -m "chore: daily data refresh [skip ci]"
            git push
          else
            echo "No data changes."
          fi

      - name: Build
        run: npm run build
        env:
          CI: false # keep eslint warnings non-fatal

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          publish_branch: gh-pages
